<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browni's Fils</title>

<style>
body{
    background:#050814;
    color:#ffffff;
    font-family:Consolas, monospace;
    text-align:center;
    margin:0;
    overflow-x:hidden;
}

canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

h1{
    margin-top:50px;
    text-shadow:0 0 10px #7aa2ff;
}

.box{
    width:80%;
    max-width:700px;
    margin:30px auto;
    padding:20px;
    border:2px solid #7aa2ff;
    background:rgba(5,8,20,0.8);
    backdrop-filter:blur(5px);
    border-radius:10px;
}

a{
    display:block;
    color:#7aa2ff;
    text-decoration:none;
    margin:15px;
    padding:15px;
    border:1px solid #7aa2ff;
    border-radius:8px;
    transition:0.3s;
}

a:hover{
    background:#7aa2ff;
    color:#050814;
    box-shadow:0 0 15px #7aa2ff;
}
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<h1>Fils</h1>

<div class="box">
    <h2>Fichiers dispo</h2>

    <a href="fichiers/Quasar client.exe" download>
       💫 Quasar Client
    </a>

    <a href="fichiers/Multiple ROBLOX.exe" download>
       🎮 Multiple Roblox Instances
    </a>
</div>

<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

resizeCanvas();

const mouse = {
    x: window.innerWidth / 2,
    y: window.innerHeight / 2
};

const points = [];
const pointCount = 120;

function createPoints(){
    points.length = 0;

    for(let i = 0; i < pointCount; i++){
        points.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height
        });
    }
}

createPoints();

window.addEventListener("mousemove", e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#050814";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    for(const p of points){

        const dx = mouse.x - p.x;
        const dy = mouse.y - p.y;
        const dist = Math.sqrt(dx*dx + dy*dy);

        // Point
        ctx.beginPath();
        ctx.arc(p.x,p.y,2,0,Math.PI*2);
        ctx.fillStyle = "#7aa2ff";
        ctx.fill();

        // Ligne vers le curseur
        if(dist < 180){
            ctx.beginPath();
            ctx.moveTo(p.x,p.y);
            ctx.lineTo(mouse.x,mouse.y);

            ctx.strokeStyle = `rgba(122,162,255,${1 - dist/180})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
        }
    }

    requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize", () => {
    resizeCanvas();
    createPoints();
});
</script>

</body>
</html>
